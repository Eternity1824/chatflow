# Assignment 3 — Baseline load test (500 k messages)
# Target: validate persistence end-to-end at moderate load.
# Run: java -jar client-part2/build/libs/client-part2-all.jar --config config/assignment3-baseline.yml

jvmOpts: "-Xms512m -Xmx1g"
client:
  serverUrl: "ws://<alb-dns-name>/chat"
  totalMessages: 500000
  warmupThreads: 16
  warmupMessagesPerThread: 500
  mainThreads: 32
  targetQps: 3000
  connectionsPerRoom: 1
  handshakeTimeoutSeconds: 20
  maxConcurrentHandshakes: 32
  handshakeRetryDelayMs: 10
  responseWaitSeconds: 600
  batchSize: 100
  batchMaxBytes: 65536
  flushIntervalMs: 5
  flushSync: false
